name: 🐍 Snake Contribution Grid

on:
  schedule:
    # Roda todo dia às 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite execução manual pelo GitHub UI

jobs:
  generate-snake:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: edezito
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "ci: update snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}